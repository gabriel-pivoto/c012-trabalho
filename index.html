<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Simulacao de Checkout</title>
	<style>
		:root {
			--bg: #f2f5f7;
			--panel: #ffffff;
			--border: #d4dde3;
			--text: #1c2a33;
			--muted: #5b6d78;
			--accent: #1f6feb;
			--ok: #0a7a43;
			--warn: #b45309;
		}

		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: radial-gradient(circle at 20% 20%, #ffffff 0, var(--bg) 45%, #e8eef2 100%);
			color: var(--text);
			display: grid;
			place-items: center;
			min-height: 100vh;
		}

		.box {
			width: min(860px, 94vw);
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 14px;
			padding: 22px;
			box-shadow: 0 10px 24px rgba(16, 24, 40, 0.08);
		}

		h1 {
			margin-top: 0;
			margin-bottom: 8px;
		}

		p {
			margin-top: 0;
			color: var(--muted);
		}

		button {
			border: 0;
			border-radius: 10px;
			padding: 11px 18px;
			background: var(--accent);
			color: #fff;
			cursor: pointer;
			font-size: 14px;
			font-weight: 700;
		}

		.controls {
			margin-top: 12px;
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
		}

		.controls button {
			padding: 8px 12px;
			font-size: 13px;
		}

		.step-info {
			margin-top: 8px;
			font-size: 13px;
			color: var(--muted);
		}

		button:disabled {
			opacity: 0.6;
			cursor: not-allowed;
		}

		.status {
			margin-top: 14px;
			font-size: 14px;
			font-weight: 600;
		}

		.summary {
			display: grid;
			grid-template-columns: repeat(4, minmax(0, 1fr));
			gap: 10px;
			margin-top: 16px;
		}

		.kpi {
			background: #f8fbff;
			border: 1px solid #d9e9ff;
			border-radius: 10px;
			padding: 10px;
		}

		.kpi .label {
			font-size: 12px;
			color: var(--muted);
		}

		.kpi .value {
			margin-top: 4px;
			font-size: 18px;
			font-weight: 700;
		}

		.clients {
			margin-top: 16px;
			display: grid;
			gap: 12px;
		}

		.thread-card {
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 14px;
			background: #fff;
		}

		.thread-title {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin: 0 0 10px;
		}

		.thread-time {
			font-size: 12px;
			color: var(--muted);
		}

		.flow {
			display: flex;
			align-items: center;
			gap: 8px;
			flex-wrap: wrap;
		}

		.stage {
			min-width: 132px;
			padding: 10px 12px;
			border: 2px solid var(--line-color, #1f6feb);
			border-radius: 14px;
			font-weight: 700;
			display: flex;
			justify-content: center;
			align-items: center;
			text-align: center;
			color: var(--line-color, #1f6feb);
			background: #f9fcff;
			opacity: 0.35;
			transition: opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
		}

		.stage.done {
			opacity: 1;
		}

		.stage.current {
			opacity: 1;
			transform: translateY(-2px);
			box-shadow: 0 6px 16px rgba(31, 111, 235, 0.18);
		}

		.stage.pending {
			opacity: 0.35;
		}

		.connector {
			display: grid;
			justify-items: center;
			min-width: 86px;
		}

		.connector-time {
			font-size: 12px;
			font-weight: 700;
			color: var(--line-color, #1f6feb);
			opacity: 0.35;
		}

		.connector-time.done {
			opacity: 1;
		}

		.connector-line {
			position: relative;
			width: 76px;
			height: 2px;
			margin-top: 3px;
			background: var(--line-color, #1f6feb);
			opacity: 0.35;
		}

		.connector-line.done {
			opacity: 1;
		}

		.connector-line::after {
			content: '';
			position: absolute;
			right: -2px;
			top: -4px;
			border-left: 10px solid var(--line-color, #1f6feb);
			border-top: 5px solid transparent;
			border-bottom: 5px solid transparent;
		}

		.stage.final {
			min-width: 170px;
			line-height: 1.2;
		}

		.logs {
			margin-top: 14px;
			background: #f8f8f8;
			border: 1px solid #ddd;
			border-radius: 8px;
			padding: 12px;
			white-space: pre-wrap;
			min-height: 120px;
			max-height: 210px;
			overflow: auto;
		}

		.tag-ok {
			color: var(--ok);
		}

		.tag-warn {
			color: var(--warn);
		}

		@media (max-width: 740px) {
			.summary {
				grid-template-columns: repeat(2, minmax(0, 1fr));
			}

			.flow {
				gap: 6px;
			}

			.connector {
				min-width: 64px;
			}

			.connector-line {
				width: 54px;
			}
		}
	</style>
</head>
<body>
	<main class="box">
		<h1>Simulacao de Checkout</h1>
		<p>Fluxo: iniciar simulacao -> API processa -> etapas e resultado visual.</p>
		<button id="startBtn">Start simulation</button>
		<div class="controls">
			<button id="prevStepBtn" disabled>Back step</button>
			<button id="nextStepBtn" disabled>Next step</button>
			<button id="playPauseBtn" disabled>Play</button>
			<button id="resetStepBtn" disabled>Reset</button>
		</div>
		<div id="stepInfo" class="step-info">Passo: -</div>
		<div id="status" class="status">Aguardando inicio.</div>

		<section class="summary">
			<div class="kpi">
				<div class="label">Estoque inicial</div>
				<div id="estoqueInicial" class="value">-</div>
			</div>
			<div class="kpi">
				<div class="label">Estoque final</div>
				<div id="estoqueFinal" class="value">-</div>
			</div>
			<div class="kpi">
				<div class="label">Race condition</div>
				<div id="race" class="value">-</div>
			</div>
			<div class="kpi">
				<div class="label">Tempo total</div>
				<div id="tempoTotal" class="value">-</div>
			</div>
		</section>

		<section id="clients" class="clients"></section>
		<div id="logs" class="logs"></div>
	</main>

	<script>
		const startBtn = document.getElementById('startBtn');
		const prevStepBtn = document.getElementById('prevStepBtn');
		const nextStepBtn = document.getElementById('nextStepBtn');
		const playPauseBtn = document.getElementById('playPauseBtn');
		const resetStepBtn = document.getElementById('resetStepBtn');
		const stepInfoEl = document.getElementById('stepInfo');
		const statusEl = document.getElementById('status');
		const estoqueInicialEl = document.getElementById('estoqueInicial');
		const estoqueFinalEl = document.getElementById('estoqueFinal');
		const raceEl = document.getElementById('race');
		const tempoTotalEl = document.getElementById('tempoTotal');
		const clientsEl = document.getElementById('clients');
		const logsEl = document.getElementById('logs');

		let lastData = null;
		let timeline = [];
		let currentStepIndex = -1;
		let autoplayTimer = null;

		function formatSeconds(value) {
			if (typeof value !== 'number') {
				return '-';
			}

			return `${value.toFixed(3)}s`;
		}

		function toMs(deltaSeconds) {
			if (typeof deltaSeconds !== 'number') {
				return '-';
			}

			return `${(deltaSeconds * 1000).toFixed(1)}ms`;
		}

		function stageFromEventName(etapa) {
			if (etapa === 'pagou') {
				return 1;
			}

			if (etapa.includes('compra concluida') || etapa.includes('falha')) {
				return 3;
			}

			if (etapa.includes('processando') || etapa.includes('verificando') || etapa.includes('aguardando API') || etapa.includes('processado')) {
				return 2;
			}

			return 0;
		}

		function buildTimeline(clientes) {
			const events = [];
			const ids = Object.keys(clientes || {});

			for (const id of ids) {
				const cliente = clientes[id];
				for (const etapa of (cliente.etapas || [])) {
					events.push({
						clienteId: id,
						clienteNome: cliente.nome || `Cliente ${id}`,
						etapa: etapa.etapa,
						tempo_s: etapa.tempo_s,
					});
				}
			}

			events.sort((a, b) => {
				if (a.tempo_s !== b.tempo_s) {
					return a.tempo_s - b.tempo_s;
				}
				return Number(a.clienteId) - Number(b.clienteId);
			});

			return events;
		}

		function buildStateAtStep(clientes, events, stepIndex) {
			const state = {};
			for (const id of Object.keys(clientes || {})) {
				state[id] = {
					stage: 0,
					currentStage: 0,
					lastEvent: '-',
				};
			}

			for (let i = 0; i <= stepIndex; i += 1) {
				const event = events[i];
				if (!event) {
					continue;
				}

				const s = stageFromEventName(event.etapa);
				state[event.clienteId].stage = Math.max(state[event.clienteId].stage, s);
				state[event.clienteId].currentStage = s;
				state[event.clienteId].lastEvent = event.etapa;
			}

			return state;
		}

		function renderClients(clientes, stateByClient = {}) {
			clientsEl.innerHTML = '';

			const ids = Object.keys(clientes || {}).sort((a, b) => Number(a) - Number(b));
			for (const id of ids) {
				const cliente = clientes[id];
				const visual = cliente.visual || {};
				const t1 = visual.fez_pedido_s;
				const t2 = visual.processando_s;
				const t3 = visual.final_s;
				const delta1 = (typeof t1 === 'number' && typeof t2 === 'number') ? (t2 - t1) : null;
				const delta2 = (typeof t2 === 'number' && typeof t3 === 'number') ? (t3 - t2) : null;
				const color = Number(id) % 2 === 0 ? '#dc2626' : '#1f6feb';
				const estadoFinal = visual.estado_final || 'Completo';
				const state = stateByClient[id] || { stage: 0, currentStage: 0, lastEvent: '-' };

				const stage1Class = state.stage >= 1 ? (state.currentStage === 1 ? 'current' : 'done') : 'pending';
				const stage2Class = state.stage >= 2 ? (state.currentStage === 2 ? 'current' : 'done') : 'pending';
				const stage3Class = state.stage >= 3 ? (state.currentStage === 3 ? 'current' : 'done') : 'pending';
				const connector1Class = state.stage >= 2 ? 'done' : '';
				const connector2Class = state.stage >= 3 ? 'done' : '';

				const saldoLabel = state.stage >= 3 ? (cliente.saldo_apos_cliente ?? '-') : '-';
				const finalLabel = state.stage >= 3 ? estadoFinal : 'Aguardando';

				const card = document.createElement('article');
				card.className = 'thread-card';
				card.style.setProperty('--line-color', color);
				card.innerHTML = `
					<h3 class="thread-title">
						<span>${cliente.nome || `Cliente ${id}`}</span>
						<span class="thread-time">Tempo de processamento: ${formatSeconds(cliente.tempo_processamento_s)} | Ultimo evento: ${state.lastEvent}</span>
					</h3>
					<div class="flow">
						<div class="stage ${stage1Class}">Fez pedido</div>
						<div class="connector">
							<div class="connector-time ${connector1Class}">${toMs(delta1)}</div>
							<div class="connector-line ${connector1Class}"></div>
						</div>
						<div class="stage ${stage2Class}">Processando</div>
						<div class="connector">
							<div class="connector-time ${connector2Class}">${toMs(delta2)}</div>
							<div class="connector-line ${connector2Class}"></div>
						</div>
						<div class="stage final ${stage3Class}">
							<div>${finalLabel}</div>
							<div>Saldo ${saldoLabel}</div>
						</div>
					</div>
				`;

				clientsEl.appendChild(card);
			}
		}

		function stopAutoplay() {
			if (autoplayTimer) {
				clearInterval(autoplayTimer);
				autoplayTimer = null;
			}
			playPauseBtn.textContent = 'Play';
		}

		function updateReplayView() {
			if (!lastData) {
				return;
			}

			const state = buildStateAtStep(lastData.clientes || {}, timeline, currentStepIndex);
			renderClients(lastData.clientes || {}, state);

			if (currentStepIndex < 0) {
				stepInfoEl.textContent = `Passo: 0/${timeline.length}`;
				logsEl.textContent = 'Replay pronto. Use Next step para avancar.';
			} else {
				const ev = timeline[currentStepIndex];
				stepInfoEl.textContent = `Passo: ${currentStepIndex + 1}/${timeline.length} | ${ev.clienteNome} -> ${ev.etapa} (${formatSeconds(ev.tempo_s)})`;
				const executed = timeline.slice(0, currentStepIndex + 1).map((e) => `[${formatSeconds(e.tempo_s)}] ${e.clienteNome}: ${e.etapa}`);
				logsEl.textContent = executed.join('\n');
			}

			prevStepBtn.disabled = currentStepIndex <= -1;
			nextStepBtn.disabled = currentStepIndex >= timeline.length - 1;
			resetStepBtn.disabled = timeline.length === 0;
			playPauseBtn.disabled = timeline.length === 0;
		}

		function goNextStep() {
			if (currentStepIndex < timeline.length - 1) {
				currentStepIndex += 1;
				updateReplayView();
			}

			if (currentStepIndex >= timeline.length - 1) {
				stopAutoplay();
			}
		}

		function goPrevStep() {
			if (currentStepIndex > -1) {
				currentStepIndex -= 1;
				updateReplayView();
			}
		}

		async function startSimulation() {
			startBtn.disabled = true;
			statusEl.textContent = 'Processando simulacao via API...';
			clientsEl.innerHTML = '';
			logsEl.textContent = '';
			stepInfoEl.textContent = 'Passo: -';
			stopAutoplay();
			timeline = [];
			currentStepIndex = -1;
			lastData = null;
			estoqueInicialEl.textContent = '-';
			estoqueFinalEl.textContent = '-';
			raceEl.textContent = '-';
			tempoTotalEl.textContent = '-';

			try {
				const response = await fetch('http://127.0.0.1:8000/api/simular', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json'
					},
					body: JSON.stringify({ iniciar: true })
				});

				if (!response.ok) {
					throw new Error(`Falha HTTP ${response.status}`);
				}

				const data = await response.json();

				estoqueInicialEl.textContent = String(data.estoque_inicial);
				estoqueFinalEl.textContent = String(data.estoque_final);
				tempoTotalEl.textContent = formatSeconds(data.tempo_total_s);
				raceEl.textContent = data.race_condition ? 'SIM' : 'NAO';
				raceEl.className = `value ${data.race_condition ? 'tag-warn' : 'tag-ok'}`;

				lastData = data;
				timeline = buildTimeline(data.clientes || {});
				currentStepIndex = -1;
				updateReplayView();
				statusEl.textContent = 'Simulacao concluida. Use os controles para slow motion.';
			} catch (error) {
				statusEl.textContent = 'Erro ao chamar API.';
				logsEl.textContent = String(error);
				stopAutoplay();
			} finally {
				startBtn.disabled = false;
			}
		}

		startBtn.addEventListener('click', startSimulation);
		prevStepBtn.addEventListener('click', () => {
			stopAutoplay();
			goPrevStep();
		});
		nextStepBtn.addEventListener('click', () => {
			stopAutoplay();
			goNextStep();
		});
		resetStepBtn.addEventListener('click', () => {
			stopAutoplay();
			currentStepIndex = -1;
			updateReplayView();
		});
		playPauseBtn.addEventListener('click', () => {
			if (!timeline.length) {
				return;
			}

			if (autoplayTimer) {
				stopAutoplay();
				return;
			}

			playPauseBtn.textContent = 'Pause';
			autoplayTimer = setInterval(() => {
				if (currentStepIndex >= timeline.length - 1) {
					stopAutoplay();
					return;
				}
				goNextStep();
			}, 650);
		});
	</script>
</body>
</html>
